{% extends 'dashboard/base.html' %}
{% block title %}Delete {{ type }}{% endblock %}

{% block content %}
<div class="dash-header">
    <h1><i class="fas fa-exclamation-triangle" style="color:#ff6584"></i> Delete {{ type }}</h1>
</div>

<div class="dash-card" style="max-width:500px">
    <p style="font-size:1.05rem; margin-bottom:1.5rem">
        Are you sure you want to delete <strong>"{{ obj }}"</strong>?
    </p>
    <p style="color:#ff6584; font-size:0.9rem; margin-bottom:1.5rem">
        <i class="fas fa-exclamation-circle"></i> This action cannot be undone.
    </p>
    <form method="POST">
        {% csrf_token %}
        <div style="display:flex; gap:1rem">
            <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
            <a href="{% url back_url %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
